<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Voxelised War Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:'Bricolage Grotesque',system-ui,sans-serif;min-height:100vh}input,textarea,select,button{font-family:inherit}::selection{background:#00ff88;color:#000}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:3px}.lbl{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#555;font-weight:500;margin-bottom:.3rem}.inp{width:100%;padding:.6rem .7rem;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:5px;color:#ccc;font-size:.85rem;outline:none}.inp:focus{border-color:#555}.card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:1rem;margin-bottom:1rem}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const API=window.location.origin+'/api/data';
const T_DATE=new Date('2026-11-30T23:59:59'),S_DATE=new Date('2026-03-29'),T_REV=8000000;
const STREAMS=['Side Kick (salary)','Voxelised (agency)','Smaeccan (advisory)','Parvani (paused)','D2C Platform (dev)','Polymarket (paused)'];
const fmt=n=>{if(n>=1e7)return'\u20B9'+(n/1e7).toFixed(1)+'Cr';if(n>=1e5)return'\u20B9'+(n/1e5).toFixed(1)+'L';if(n>=1e3)return'\u20B9'+(n/1e3).toFixed(0)+'K';return'\u20B9'+n};
function getPhase(d){if(d<14)return{n:'01',name:'FOUNDATION',w:'Wk 1-2',f:'Entity setup, email warming, warm outreach, case study #1',tasks:['Confront CA - fix entity','File GST application','Set up Skydo + Razorpay','Create 3 email senders in SmartLead','Start warming emails (14 days)','Send 30 warm messages','Create case study PDF #1','Record Loom video #1','Create ClickUp pipeline board','Update website with 3 offers + Calendly']};if(d<28)return{n:'02',name:'OUTBOUND LAUNCH',w:'Wk 3-4',f:'Cold sequences live, LinkedIn, discovery calls',tasks:['Launch India email sequence (63 leads)','Launch Gulf LinkedIn-first sequence','Launch ANZ email+LinkedIn+Loom','Book 5-10 discovery calls','Send 50 follow-ups','Create case study PDF #2','Post 3 LinkedIn pieces','Refine ICP from response data']};if(d<56)return{n:'03',name:'PIPELINE BUILD',w:'Wk 5-8',f:'Full outbound, proposals, close first deals',tasks:['200+ outbound/week','10-15 discovery calls/week','5+ proposals out','Close first audit deal','Close first retainer','Deliver first Build Free project','Expand to ANZ/SEA leads','3rd case study from live client']};if(d<120)return{n:'04',name:'REVENUE',w:'Mo 3-4',f:'Deliver, expand, upsells',tasks:['Maintain 200+ outbound/week','Close 2-3 retainer clients','Upsell existing clients','Launch referral campaign','Build 2nd Loom for ANZ','Raise retainer rates','Target: 4-6L/month']};return{n:'05',name:'SCALE',w:'Mo 5-8',f:'Referrals, raise rates, team',tasks:['Referral pipeline 50%+','Raise rates 20-30%','Hire first VA','Target: 8-12L/month','Productized service','Inbound content engine','2-3 project deals ($10-25K)','Hit 80L cumulative']}}
function getSched(dow){const W=[{t:'07:00',l:'Pipeline review + responses',c:'#888',d:'Email replies, LinkedIn, ClickUp'},{t:'08:00',l:'LinkedIn - 20 connects',c:'#5BA0D6',d:'Gulf: LI first, email later'},{t:'09:00',l:'Cold email sequences',c:'#00ff88',d:'SmartLead metrics, rotate'},{t:'10:00',l:'Side Kick deliverables',c:'#ffaa00',d:'Material, Veloka, Sprinto'},{t:'13:00',l:'Keto lunch + break',c:'#444',d:'Walk the dogs'},{t:'14:00',l:'Voxelised - build',c:'#00ff88',d:'Client work, builds'},{t:'16:00',l:'Follow-ups / calls',c:'#ff6b6b',d:'Discovery calls, proposals'},{t:'17:00',l:'Case study / Loom',c:'#c084fc',d:'Write, record, LinkedIn'},{t:'19:00',l:'Evening review',c:'#888',d:'Update tracker, 3 priorities'}];const SA=[{t:'09:00',l:'Weekly metrics',c:'#ffaa00',d:'Open/reply rates, pipeline'},{t:'10:00',l:'Plan next week',c:'#00ff88',d:'Queue leads, sequences'},{t:'12:00',l:'Case study + site',c:'#c084fc',d:'Polish, update'},{t:'14:00',l:'Pipeline cleanup',c:'#5BA0D6',d:'CRM, stale leads'},{t:'16:00',l:'Content batch',c:'#c084fc',d:'3-5 LinkedIn posts'},{t:'18:00',l:'Free evening',c:'#444',d:'Rest'}];const SU=[{t:'10:00',l:'Light planning',c:'#888',d:'Inbox zero, scan pipeline'},{t:'11:00',l:'Smaeccan (1hr)',c:'#ffaa00',d:'Strategic input only'},{t:'12:00',l:'Relationship texting',c:'#ff6b6b',d:'Friends, family'},{t:'14:00',l:'Rest / dogs',c:'#444',d:'Pug + maltipoo, gym'},{t:'18:00',l:'Prep Monday',c:'#00ff88',d:'3 priorities for tmrw'}];if(dow===0)return{blocks:SU,label:'SUNDAY - REST'};if(dow===6)return{blocks:SA,label:'SATURDAY - REVIEW'};return{blocks:W,label:['','MON','TUE','WED','THU','FRI'][dow]+' - OUTREACH'}}
function App(){const DEF={rev:0,clients:0,pipeline:0,leads:89,msg:'',streams:[0,0,0,0,0,0],log:[],checkedTasks:[]};const[st,setSt]=useState(DEF);const[ld,setLd]=useState(true);const[ss,setSs]=useState('');const tmr=useRef(null);
useEffect(()=>{fetch(API).then(r=>r.json()).then(d=>{setSt(s=>({...DEF,...d}));setLd(false)}).catch(()=>setLd(false))},[]);
const save=useCallback(ns=>{setSt(ns);if(tmr.current)clearTimeout(tmr.current);tmr.current=setTimeout(()=>{setSs('saving...');fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(ns)}).then(r=>r.json()).then(()=>{setSs('saved');setTimeout(()=>setSs(''),2e3)}).catch(()=>setSs('error'))},600)},[]);
const upd=(k,v)=>save({...st,[k]:v});const updS=(i,v)=>{const s=[...st.streams];s[i]=parseInt(v)||0;save({...st,streams:s,rev:s.reduce((a,b)=>a+b,0)})};const togT=id=>{const c=[...(st.checkedTasks||[])];const x=c.indexOf(id);if(x>=0)c.splice(x,1);else c.push(id);save({...st,checkedTasks:c})};const addL=n=>{save({...st,log:[{date:new Date().toISOString().split('T')[0],note:n,rev:st.rev},...(st.log||[])].slice(0,100)})};
const now=new Date(),dS=Math.max(0,Math.floor((now-S_DATE)/864e5)),dL=Math.max(0,Math.floor((T_DATE-now)/864e5)),tD=Math.floor((T_DATE-S_DATE)/864e5),pT=Math.round(dS/tD*100),pR=Math.min(100,Math.round(st.rev/T_REV*100)),ph=getPhase(dS),sc=getSched(now.getDay()),wk=Math.floor(dS/7)+1,mT=Math.round((T_REV-st.rev)/Math.max(1,Math.ceil(dL/30)));
const wpUrl=`${window.location.origin}/api/wallpaper?width=1170&height=2532`;const[cp,setCp]=useState(false);const[li,setLi]=useState('');
if(ld)return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{color:'#555'}}>Loading...</div></div>);
return(<div style={{maxWidth:520,margin:'0 auto',padding:'1rem',paddingBottom:'4rem'}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1.5rem',paddingTop:'.5rem'}}><div><div style={{fontSize:'.65rem',letterSpacing:'.3em',color:'#333',marginBottom:4}}>VOXELISED</div><h1 style={{fontSize:'1.8rem',fontWeight:800,lineHeight:1,margin:'0 0 .3rem'}}>War Tracker</h1><div style={{fontSize:'.8rem',color:'#555'}}>80L by Nov 2026 - Week {wk}</div></div><div style={{fontSize:'.65rem',color:ss==='saved'?'#00ff88':ss==='error'?'#ff4444':'#555',letterSpacing:'.1em'}}>{ss==='saved'?'\u2713 SAVED':ss}</div></div>
<div className="card" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontSize:'2.5rem',fontWeight:800,color:'#00ff88',lineHeight:1}}>{dL}</div><div style={{fontSize:'.65rem',letterSpacing:'.15em',color:'#555',marginTop:2}}>DAYS LEFT</div></div><div style={{textAlign:'center'}}><div style={{fontSize:'1.5rem',fontWeight:700}}>{pT}%</div><div style={{fontSize:'.65rem',letterSpacing:'.15em',color:'#555'}}>TIME</div></div><div style={{textAlign:'right'}}><div style={{fontSize:'1.5rem',fontWeight:700,color:pR>=pT?'#00ff88':'#ff4444'}}>{pR}%</div><div style={{fontSize:'.65rem',letterSpacing:'.15em',color:'#555'}}>REV</div></div></div>
<div className="card"><div className="lbl">Revenue - {fmt(st.rev)} / 80L</div><div style={{height:12,background:'#1a1a1a',borderRadius:6,overflow:'hidden',marginBottom:8}}><div style={{height:12,background:'#00ff88',borderRadius:6,width:`${pR}%`,transition:'width .3s'}}/></div><div style={{display:'flex',justifyContent:'space-between',fontSize:'.72rem',color:'#555'}}><span>{st.clients} clients</span><span>Monthly: {fmt(mT)}</span></div></div>
<div className="card"><div className="lbl" style={{marginBottom:8}}>Revenue by Stream</div>{STREAMS.map((n,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><span style={{fontSize:'.75rem',color:i<=1?'#fff':'#333',minWidth:150,flex:'0 0 150px'}}>{n}</span><input className="inp" type="number" value={st.streams[i]||''} onChange={e=>updS(i,e.target.value)} placeholder="0" style={{fontFamily:'JetBrains Mono,monospace',fontSize:'.8rem',padding:'.4rem .6rem',textAlign:'right'}}/></div>))}<div style={{fontSize:'.72rem',color:'#555',marginTop:6,textAlign:'right'}}>Total: {fmt(st.streams.reduce((a,b)=>a+b,0))}</div></div>
<div className="card"><div className="lbl" style={{marginBottom:8}}>Pipeline</div><div style={{display:'flex',gap:8}}><div style={{flex:1}}><div className="lbl">Clients</div><input className="inp" type="number" value={st.clients||''} onChange={e=>upd('clients',parseInt(e.target.value)||0)} style={{fontFamily:'monospace',textAlign:'center'}}/></div><div style={{flex:1}}><div className="lbl">Pipeline</div><input className="inp" type="number" value={st.pipeline||''} onChange={e=>upd('pipeline',parseInt(e.target.value)||0)} style={{fontFamily:'monospace',textAlign:'center'}}/></div><div style={{flex:1}}><div className="lbl">Leads</div><input className="inp" type="number" value={st.leads||''} onChange={e=>upd('leads',parseInt(e.target.value)||0)} style={{fontFamily:'monospace',textAlign:'center'}}/></div></div></div>
<div className="card" style={{borderLeft:'3px solid #00ff88'}}><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><span style={{fontSize:'.65rem',color:'#00ff88',letterSpacing:'.2em'}}>PHASE {ph.n}</span><span style={{fontSize:'.95rem',fontWeight:700}}>{ph.name}</span><span style={{fontSize:'.65rem',color:'#333'}}>{ph.w}</span></div><div style={{fontSize:'.78rem',color:'#888',marginBottom:10}}>{ph.f}</div><div className="lbl" style={{marginBottom:6}}>Checklist</div>{ph.tasks.map((t,i)=>{const id=ph.n+'-'+i,chk=(st.checkedTasks||[]).includes(id);return(<div key={i} style={{display:'flex',gap:8,marginBottom:4,cursor:'pointer',opacity:chk?.5:1}} onClick={()=>togT(id)}><span style={{fontSize:'.75rem'}}>{chk?'\u2611':'\u2610'}</span><span style={{fontSize:'.78rem',color:chk?'#333':'#888',textDecoration:chk?'line-through':'none'}}>{t}</span></div>)})}</div>
<div className="card"><div className="lbl" style={{marginBottom:10}}>{sc.label}</div>{sc.blocks.map((b,i)=>(<div key={i} style={{display:'flex',gap:10,marginBottom:10,paddingBottom:10,borderBottom:'1px solid #1a1a1a'}}><div style={{minWidth:45,fontFamily:'JetBrains Mono,monospace',fontSize:'.75rem',color:'#333',paddingTop:2}}>{b.t}</div><div style={{width:3,borderRadius:2,background:b.c,flexShrink:0}}/><div><div style={{fontSize:'.85rem',fontWeight:500,marginBottom:2}}>{b.l}</div><div style={{fontSize:'.72rem',color:'#333',lineHeight:1.3}}>{b.d}</div></div></div>))}</div>
<div className="card"><div className="lbl" style={{marginBottom:8}}>Activity Log</div><div style={{display:'flex',gap:6,marginBottom:10}}><input className="inp" value={li} onChange={e=>setLi(e.target.value)} placeholder="Signed new client..." onKeyDown={e=>{if(e.key==='Enter'&&li.trim()){addL(li.trim());setLi('')}}}/><button onClick={()=>{if(li.trim()){addL(li.trim());setLi('')}}} style={{background:'#00ff88',color:'#000',border:'none',borderRadius:5,padding:'0 12px',fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',fontSize:'.75rem'}}>+</button></div>{(st.log||[]).slice(0,10).map((e,i)=>(<div key={i} style={{display:'flex',gap:8,marginBottom:6,fontSize:'.75rem'}}><span style={{color:'#333',fontFamily:'monospace',minWidth:75}}>{e.date}</span><span style={{color:'#888'}}>{e.note}</span></div>))}{(!st.log||!st.log.length)&&<div style={{fontSize:'.75rem',color:'#333'}}>No entries yet.</div>}</div>
<div className="card" style={{borderLeft:'3px solid #ffaa00'}}><div className="lbl" style={{marginBottom:6}}>iPhone Wallpaper</div><div style={{fontSize:'.72rem',color:'#555',marginBottom:8}}>Data on server. Wallpaper reads live. Set once.</div><div style={{background:'#000',borderRadius:5,padding:8,marginBottom:8,border:'1px solid #1a1a1a'}}><code style={{fontSize:'.6rem',color:'#ffaa00',wordBreak:'break-all',fontFamily:'JetBrains Mono,monospace'}}>{wpUrl}</code></div><div style={{display:'flex',gap:6}}><button onClick={()=>{navigator.clipboard.writeText(wpUrl);setCp(true);setTimeout(()=>setCp(false),2e3)}} style={{flex:1,padding:'8px 0',background:cp?'#00ff88':'#000',color:cp?'#000':'#ffaa00',border:'1px solid #ffaa00',borderRadius:5,fontWeight:600,cursor:'pointer',fontSize:'.75rem'}}>{cp?'\u2713 COPIED':'COPY URL'}</button><a href={wpUrl} target="_blank" rel="noopener noreferrer" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'8px 0',background:'#000',color:'#555',border:'1px solid #1a1a1a',borderRadius:5,textDecoration:'none',fontWeight:600,fontSize:'.75rem'}}>PREVIEW</a></div><div style={{fontSize:'.6rem',color:'#333',marginTop:8,lineHeight:1.5}}>1. Shortcuts &gt; New &gt; Get Contents of URL &gt; paste<br/>2. Set Wallpaper &gt; Contents of URL &gt; Lock Screen<br/>3. Automations &gt; Every hour &gt; Run shortcut</div></div>
<div className="card"><div className="lbl" style={{marginBottom:6}}>Custom Message</div><input className="inp" value={st.msg||''} onChange={e=>upd('msg',e.target.value)} placeholder="Override daily quote"/></div>
<div className="card"><div className="lbl" style={{marginBottom:8}}>Outreach Ref</div><div style={{fontSize:'.78rem',color:'#888',lineHeight:1.6}}><span style={{color:'#00ff88'}}>India</span> Email+LI | <span style={{color:'#ffaa00'}}>Gulf</span> LI first | <span style={{color:'#5BA0D6'}}>ANZ</span> Email+LI+Loom</div><div style={{fontSize:'.72rem',color:'#333',marginTop:6}}>Audit 75K-$3K | Retainer 2-3.5L | Project 5-12L</div></div>
<div className="card" style={{opacity:.5}}><div className="lbl" style={{color:'#ff4444'}}>Kill List</div><div style={{fontSize:'.75rem',color:'#333',marginTop:4}}>Polymarket passive | Smaeccan 1hr/wk | Parvani paused | D2C paused | All sides zero</div></div>
<div style={{textAlign:'center',marginTop:'2rem'}}><button onClick={()=>{if(confirm('Reset all?'))save(DEF)}} style={{background:'none',border:'1px solid #220000',color:'#ff4444',padding:'6px 16px',borderRadius:5,fontSize:'.7rem',cursor:'pointer',opacity:.4}}>Reset</button></div>
</div>)}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
